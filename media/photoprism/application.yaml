apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: photoprism
  namespace: argo-cd
spec:
  project: media
  source:
    repoURL: https://andrenarchy.github.io/helm-charts
    chart: photoprism
    targetRevision: ">=0.0.0"
    helm:
      values: |
        image:
          repository: photoprism/photoprism
          tag: "latest"
        env:
          PHOTOPRISM_SITE_URL: "https://photos.whitediver.keenetic.link/"
          PHOTOPRISM_WORKERS: "3"
          PHOTOPRISM_DISABLE_TENSORFLOW: "true"
          PHOTOPRISM_DEBUG: "false"
          PHOTOPRISM_READONLY: "true"
          PHOTOPRISM_PUBLIC: "false"
          PHOTOPRISM_DEFAULT_TLS: "false"
          PHOTOPRISM_LOG_LEVEL: "debug"
          PHOTOPRISM_DATABASE_DSN: "/photoprism/storage/index.db?_busy_timeout=30000&_journal=TRUNCATE&_txlock=immediate&_fk=1"
          PHOTOPRISM_DATABASE_CONNS: 1
          PHOTOPRISM_DATABASE_CONNS_IDLE: 0
          PHOTOPRISM_DISABLE_CHOWN: "true"
          UID: "999"
          PHOTOPRISM_OIDC_URI: "https://accounts.google.com"
          PHOTOPRISM_OIDC_PROVIDER: "Google"
          PHOTOPRISM_OIDC_REGISTER: "true"
          PHOTOPRISM_OIDC_CLIENT:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: client-id
          PHOTOPRISM_OIDC_SECRET:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: client-secret
          PHOTOPRISM_ADMIN_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: photoprism-oidc
                key: admin-password
        securityContext:
          runAsUser: 999
          runAsGroup: 999
        nodeSelector:
          kubernetes.io/hostname: kube-worker-3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1500m
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 50
              failureThreshold: 120
          liveness:
            enabled: false
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
        persistence:
          config:
            enabled: true
            accessMode: ReadWriteMany
            size: 20Gi
            storageClass: smb
            mountPath: /photoprism/storage
          originals:
            enabled: true
            accessMode: ReadWriteMany
            size: 200Gi
            storageClass: "-"
            volumeName: photoprism-pictures
            mountPath: /photoprism/originals
            readOnly: true
        ingress:
          main:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/proxy-body-size: "100m"
            hosts:
              - host: photos.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: chart-photoprism-tls
                hosts:
                  - photos.whitediver.keenetic.link
  destination:
    server: https://kubernetes.default.svc
    namespace: photoprism
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: photoprism-pictures
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: photoprism
    name: photoprism-originals
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: photoprism-pictures
    nodeStageSecretRef:
      name: smbcreds
      namespace: smb
    volumeAttributes:
      source: "//192.168.99.44/pictures"
  mountOptions:
    - dir_mode=0755
    - file_mode=0644
    - uid=999
    - gid=999
    - vers=3.1.1
    - serverino
    - nobrl
