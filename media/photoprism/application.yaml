apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: photoprism
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://andrenarchy.github.io/helm-charts
    chart: photoprism
    targetRevision: ">=0.0.0"
    helm:
      values: |
        image:
          repository: photoprism/photoprism
          tag: "latest"
        env:
          PHOTOPRISM_SITE_URL: "https://photos.whitediver.keenetic.link/"
          PHOTOPRISM_WORKERS: "2"          # cap indexing concurrency (default = #cores) to bound RAM/CPU spikes
          PHOTOPRISM_DEBUG: "false"
          PHOTOPRISM_READONLY: "true"
          PHOTOPRISM_PUBLIC: "true"
          PHOTOPRISM_DEFAULT_TLS: "false"
          PHOTOPRISM_LOG_LEVEL: "debug"
          PHOTOPRISM_DATABASE_DSN: "index.db?_busy_timeout=15000&_journal=WAL&_txlock=immediate&cache=shared&_fk=1"
          PHOTOPRISM_DATABASE_CONNS: 1
          PHOTOPRISM_DATABASE_CONNS_IDLE: 0
          PHOTOPRISM_DISABLE_CHOWN: "true"
          UID: "999"
        securityContext:
          runAsUser: 999
          runAsGroup: 999
        # Pinned to kube-worker-3 (Pi 5, 8Gi RAM). Memory is bounded so a heavy
        # index run can never take the node down again: the pod is OOM-killed at
        # the limit instead of the kubelet hanging (what knocked out worker-1).
        nodeSelector:
          kubernetes.io/hostname: kube-worker-3
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 3Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 50
              failureThreshold: 120
          liveness:
            enabled: false
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 2342
              periodSeconds: 10
              timeoutSeconds: 30
              failureThreshold: 3
        persistence:
          config:
            enabled: true
            accessMode: ReadWriteMany
            size: 20Gi
            storageClass: smb
            mountPath: /photoprism/storage
          # Originals = the cluster's current media folder: the `pictures`
          # SMB share //192.168.99.44/pictures (same share pigallery2 and
          # jellyfin read). Statically bound to the photoprism-pictures PV
          # at the end of this file; mounted read-only so PhotoPrism never
          # mutates the shared library (its index/thumbnails live in the
          # `config` storage volume, and PHOTOPRISM_READONLY is "true").
          originals:
            enabled: true
            accessMode: ReadWriteMany
            size: 200Gi
            storageClass: "-"          # "-" -> storageClassName "" (static bind, no dynamic provisioning)
            volumeName: photoprism-pictures
            mountPath: /photoprism/originals
            readOnly: true
        ingress:
          main:
            enabled: true
            ingressClassName: nginx
            annotations:
              nginx.ingress.kubernetes.io/auth-type: basic
              nginx.ingress.kubernetes.io/auth-secret: photoprism-basic-auth
              nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            hosts:
              - host: photos.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
            tls:
              - secretName: chart-photoprism-tls
                hosts:
                  - photos.whitediver.keenetic.link
  destination:
    server: https://kubernetes.default.svc
    namespace: photoprism
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
# Static SMB-CSI volume for the cluster's current photo media folder.
# Mirrors media/pigallery2 (same //192.168.99.44/pictures share). Bound to
# the chart-created PVC photoprism-originals (namespace photoprism) via the
# claimRef below + that PVC's volumeName. uid/gid 999 match PhotoPrism's user.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: photoprism-pictures
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: photoprism
    name: photoprism-originals
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: photoprism-pictures
    nodeStageSecretRef:
      name: smbcreds
      namespace: smb
    volumeAttributes:
      source: "//192.168.99.44/pictures"
  mountOptions:
    - dir_mode=0755
    - file_mode=0644
    - uid=999
    - gid=999
    - vers=3.1.1
    - serverino
    - nobrl
