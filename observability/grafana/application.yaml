apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.14
    helm:
      values: |
        replicas: 1
        deploymentStrategy:
          type: Recreate
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          runAsGroup: 999
          fsGroup: 999
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          # Чарт 10.5.14 не рендерит startupProbe, поэтому запас на медленный старт
          # (Grafana 12 на ARM: плагины + unified-storage) даём прямо в liveness:
          # 180 + 20*15 = ~480с, иначе liveness убивал на 240с в краш-луп.
          initialDelaySeconds: 180
          timeoutSeconds: 30
          periodSeconds: 15
          failureThreshold: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 15
          periodSeconds: 10
          failureThreshold: 30
        testFramework:
          enabled: false
        envValueFrom:
          GF_AUTH_GOOGLE_CLIENT_SECRET:
            secretKeyRef:
              name: grafana-oauth
              key: client_secret
          GF_DATABASE_PASSWORD:
            secretKeyRef:
              name: grafana-pg-app
              key: password
        persistence:
          # БД уведена с SMB на local-path (быстрый локальный диск) — CIFS-локи, из-за
          # которых Grafana падала/мерцала (database is locked, 503 на /login), исчезают.
          # PVC grafana-local предзаполнен бэкапом старой БД (13 дашбордов/3 DS/6 алертов),
          # local-path PV привязан к kube-master → под пиннится туда по volume affinity.
          enabled: true
          type: pvc
          existingClaim: grafana-local
        initChownData:
          enabled: false
        # Ни file-провижн дашбордов, ни gnetId-загрузки: дашборды живут в БД Grafana
        # (UI/MCP). Провайдер убран, чтобы провижн не удалял восстановленные дашборды;
        # download-dashboards init (висел на curl к grafana.com) тоже больше не создаётся.
        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "false"
          path: /grafana
          pathType: Prefix
          hosts:
            - dev.whitediver.keenetic.link
          tls:
            - secretName: chart-grafana-tls
              hosts:
                - dev.whitediver.keenetic.link
        grafana.ini:
          database:
            # БД на CNPG Postgres (grafana-pg) — единообразно с litellm/n8n/vikunja
            # и реальный конкурентный доступ (SQLite упирался в "database is locked").
            # Пароль — из секрета grafana-pg-app через GF_DATABASE_PASSWORD (env).
            type: postgres
            host: grafana-pg-rw:5432
            name: grafana
            user: grafana
            ssl_mode: require
          analytics:
            # Не дёргать grafana.com на старте (проверка обновлений плагинов): на
            # RU-линии это ~30с/плагин, и старт не укладывался в liveness → краш-луп.
            check_for_plugin_updates: false
            reporting_enabled: false
          server:
            domain: dev.whitediver.keenetic.link
            root_url: https://dev.whitediver.keenetic.link/grafana
            serve_from_sub_path: true
          security:
            allow_embedding: true
            cookie_secure: false
            cookie_samesite: lax
          users:
            auto_assign_org_role: Admin
          # Алертинг Grafana оставлен ВЫКЛ: даже на local-path SQLite его старт
          # (ngalert.state.manager warm cache) конкурирует с unified-storage
          # resource-server за одно SQLite-соединение → "database is locked" →
          # краш старта. Правила целы в БД. Включим после переезда на Postgres/CNPG,
          # где конкурентные писатели не проблема.
          unified_alerting:
            enabled: false
          auth.google:
            enabled: true
            allow_sign_up: true
            auto_login: true
            client_id: "457232950309-a0kkupkhttff9qcvcipdhpn8bd8fv948.apps.googleusercontent.com"
            scopes: "https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email"
            auth_url: https://accounts.google.com/o/oauth2/auth
            token_url: https://accounts.google.com/o/oauth2/token
            allowed_domains: "whitediver.com dev.whitediver.keenetic.link grafana.whitediver.keenetic.link"
            use_pkce: true
            skip_org_role_sync: true
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
