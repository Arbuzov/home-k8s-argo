  claude_status_exporter.py: |
    #!/usr/bin/env python3
    """
    Prometheus exporter для статуса сервисов Anthropic. Живёт в кластере (24/7).
    
    Источник: https://status.anthropic.com/api/v2/ — публичный Atlassian Statuspage,
    без авторизации. Компоненты: claude.ai, Claude Console, Claude API, Claude Code,
    Claude Cowork и другие.
    
    Почему не json_exporter: Statuspage отдаёт статус строкой
    ("operational" / "degraded_performance" / ...), а для state timeline и расчёта
    availability нужно число. Маппинг строки в число в json_exporter требует
    jsonpath-акробатики; тут он в одном dict.
    
    Отдаёт и info-метрику (со строковым статусом в лейбле), и числовое здоровье:
    info удобна для таблиц, число — для timeline и avg_over_time.
    
    Зависимости:
        pip install prometheus-client
    
    Запуск:
        python claude_status_exporter.py --port 9102
    """
    
    from __future__ import annotations
    
    import argparse
    import json
    import logging
    import threading
    import time
    import urllib.request
    from typing import Any
    
    from prometheus_client import REGISTRY, start_http_server
    from prometheus_client.core import GaugeMetricFamily
    
    BASE_URL = "https://status.anthropic.com/api/v2"
    
    # Statuspage component statuses -> числовое здоровье.
    HEALTH = {
        "operational": 1.0,
        "degraded_performance": 0.66,
        "under_maintenance": 0.5,
        "partial_outage": 0.33,
        "major_outage": 0.0,
    }
    
    log = logging.getLogger("claude_status_exporter")
    
    
    class ClaudeStatusCollector:
        def __init__(self, ttl: float = 60.0, timeout: float = 15.0) -> None:
            self._ttl = ttl
            self._timeout = timeout
            self._lock = threading.Lock()
            self._payload: dict[str, Any] | None = None
            self._fetched_at = 0.0
    
        def _fetch(self) -> dict[str, Any]:
            req = urllib.request.Request(
                f"{BASE_URL}/summary.json",
                headers={
                    "User-Agent": "claude-observability/1.0",
                    "Accept": "application/json",
                },
            )
            with urllib.request.urlopen(req, timeout=self._timeout) as resp:
                return json.loads(resp.read().decode("utf-8"))
    
        def _cached(self) -> dict[str, Any] | None:
            with self._lock:
                if self._payload is not None and time.time() - self._fetched_at < self._ttl:
                    return self._payload
                try:
                    self._payload = self._fetch()
                    self._fetched_at = time.time()
                except Exception as exc:  # noqa: BLE001
                    log.warning("fetch failed: %s", exc)
                    return None
                return self._payload
    
        def collect(self):
            payload = self._cached()
    
            success = GaugeMetricFamily(
                "claude_status_scrape_success",
                "1 если status.anthropic.com ответил.",
            )
            success.add_metric([], 1.0 if payload is not None else 0.0)
            yield success
    
            if payload is None:
                return
    
            # Сводный индикатор: none / minor / major / critical.
            status = payload.get("status") or {}
            if status.get("indicator"):
                indicator = GaugeMetricFamily(
                    "claude_status_indicator_up",
                    "Сводный индикатор страницы. Значение всегда 1, полезны лейблы.",
                    labels=["indicator", "description"],
                )
                indicator.add_metric(
                    [str(status["indicator"]), str(status.get("description", ""))], 1.0
                )
                yield indicator
    
            info = GaugeMetricFamily(
                "claude_status_component_up",
                "Компонент и его строковый статус. Значение всегда 1, полезны лейблы.",
                labels=["component", "status"],
            )
            health = GaugeMetricFamily(
                "claude_status_component_health",
                "1=operational, 0.66=degraded, 0.5=maintenance, 0.33=partial, 0=major outage.",
                labels=["component"],
            )
    
            for comp in payload.get("components", []):
                # Группы — контейнеры для других компонентов, своего статуса по сути не несут.
                if comp.get("group"):
                    continue
                name = str(comp.get("name", "unknown"))
                state = str(comp.get("status", "unknown"))
                info.add_metric([name, state], 1.0)
                health.add_metric([name], HEALTH.get(state, -1.0))
    
            yield info
            yield health
    
            # Активные инциденты — счётчиком по impact, чтобы не плодить кардинальность.
            incidents = payload.get("incidents", [])
            by_impact: dict[str, int] = {}
            for inc in incidents:
                by_impact[str(inc.get("impact", "unknown"))] = (
                    by_impact.get(str(inc.get("impact", "unknown")), 0) + 1
                )
            if by_impact:
                active = GaugeMetricFamily(
                    "claude_status_active_incidents",
                    "Незакрытые инциденты по уровню impact.",
                    labels=["impact"],
                )
                for impact, count in by_impact.items():
                    active.add_metric([impact], float(count))
                yield active
    
    
    def main() -> None:
        parser = argparse.ArgumentParser(description=__doc__)
        parser.add_argument("--port", type=int, default=9102)
        parser.add_argument("--addr", default="0.0.0.0")
        parser.add_argument("--ttl", type=float, default=60.0)
        parser.add_argument("--verbose", action="store_true")
        args = parser.parse_args()
    
        logging.basicConfig(
            level=logging.DEBUG if args.verbose else logging.INFO,
            format="%(asctime)s %(levelname)s %(message)s",
        )
    
        REGISTRY.register(ClaudeStatusCollector(ttl=args.ttl))
        start_http_server(args.port, addr=args.addr)
        log.info("listening on %s:%s/metrics", args.addr, args.port)
    
        while True:
            time.sleep(3600)
    
    
    if __name__ == "__main__":
        main()
    