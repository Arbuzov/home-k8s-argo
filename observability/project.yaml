apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argo-cd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Metrics / logs apps — deployed via the observability app-of-apps
  sourceRepos:
    - https://github.com/Arbuzov/local-cluster-argo.git
    - https://github.com/Arbuzov/home-cluster-helm.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: influxdb
    - server: https://kubernetes.default.svc
      namespace: argo-cd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
