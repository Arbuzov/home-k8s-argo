apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # project: default — AppProject observability не содержит
  # open-telemetry.github.io в sourceRepos.
  project: default
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.116.0
    helm:
      values: |
        mode: deployment
        replicaCount: 1

        image:
          repository: otel/opentelemetry-collector-contrib

        nodeSelector:
          kubernetes.io/hostname: kube-master

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Чарт по умолчанию тянет сбор логов и метрик хоста — тут нужен
        # только приём OTLP от Claude Code с воркстейшна.
        presets:
          logsCollection:
            enabled: false
          kubernetesAttributes:
            enabled: false
          hostMetrics:
            enabled: false
          kubeletMetrics:
            enabled: false

        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8889"
          prometheus.io/path: /metrics

        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
          prometheus:
            enabled: true
            containerPort: 8889
            servicePort: 8889
            protocol: TCP
          jaeger-compact:
            enabled: false
          jaeger-thrift:
            enabled: false
          jaeger-grpc:
            enabled: false
          zipkin:
            enabled: false

        config:
          receivers:
            jaeger: null
            zipkin: null
            prometheus: null
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch:
              timeout: 10s
              send_batch_size: 1024
            memory_limiter:
              check_interval: 5s
              limit_percentage: 80
              spike_limit_percentage: 20
            # user.email приезжает в атрибутах при OAuth-логине.
            # Один пользователь — лейбл бесполезен, а PII лишний.
            attributes/scrub:
              actions:
                - key: user.email
                  action: delete

          exporters:
            prometheus:
              endpoint: 0.0.0.0:8889
              # OTel-атрибуты (skill.name, model, agent.name) -> лейблы.
              # Без этого вся атрибуция схлопывается и половина дашборда пустая.
              resource_to_telemetry_conversion:
                enabled: true
              enable_open_metrics: false
              # Метрика исчезает, если её не обновляли сутки. Иначе серии
              # мёртвых сессий висят вечно.
              metric_expiration: 24h

          service:
            pipelines:
              traces: null
              logs: null
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, attributes/scrub, batch]
                exporters: [prometheus]
            telemetry:
              metrics:
                level: basic

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
          hosts:
            - host: otel.whitediver.keenetic.link
              paths:
                - path: /
                  pathType: Prefix
                  port: 4318
          tls:
            - secretName: otel.whitediver.keenetic.link-tls
              hosts:
                - otel.whitediver.keenetic.link

  destination:
    server: https://kubernetes.default.svc
    namespace: otel-collector
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
