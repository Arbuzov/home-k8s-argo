apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-gateway
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  # A single Ingress that routes the MCP servers whose chart hardcodes its own
  # backend (mcp-atlassian, mcp-gitlab) through oathkeeper -> litellm. Those charts
  # can't be repointed via values, so their own ingress is disabled and this owns
  # the routing. basic-memory keeps its own ingress (needs a hyphen->underscore
  # rewrite this shared, rewrite-free Ingress can't do). See platform/oathkeeper.
  source:
    repoURL: https://github.com/Arbuzov/home-k8s-argo.git
    targetRevision: main
    path: mcp/mcp-gateway
    directory:
      include: 'gateway-ingress.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
