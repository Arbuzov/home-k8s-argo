apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: basic-memory
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts
    chart: app-template
    targetRevision: 3.6.0
    helm:
      values: |
        controllers:
          basic-memory:
            type: deployment
            pod:
              nodeSelector:
                # Moved off kube-master (control-plane node, was CPU-saturated) --
                # PVC is SMB/network storage so relocating is data-safe.
                kubernetes.io/hostname: kube-worker-3
              securityContext:
                fsGroup: 1000
                fsGroupChangePolicy: OnRootMismatch
            containers:
              app:
                image:
                  repository: ghcr.io/basicmachines-co/basic-memory
                  tag: "latest"
                command:
                  - basic-memory
                args:
                  - mcp
                  - --transport
                  - streamable-http
                  - --host
                  - 0.0.0.0
                  - --port
                  - "8000"
                  - --path
                  - /mcp/basic-memory
                env:
                  BASIC_MEMORY_HOME: /app/data
                  BASIC_MEMORY_DEFAULT_PROJECT: main
                  BASIC_MEMORY_SYNC_CHANGES: "true"
                  BASIC_MEMORY_LOG_LEVEL: INFO
                  BASIC_MEMORY_NO_PROMOS: "1"
                  BASIC_MEMORY_SEMANTIC_SEARCH_ENABLED: "true"
                  BASIC_MEMORY_SEMANTIC_EMBEDDING_PROVIDER: fastembed
                  BASIC_MEMORY_SEMANTIC_EMBEDDING_MODEL: bge-small-en-v1.5
                  BASIC_MEMORY_SEMANTIC_MIN_SIMILARITY: "0.55"
                ports:
                  - name: http
                    containerPort: 8000
                resources:
                  requests:
                    memory: 256Mi
                    cpu: 50m
                  limits:
                    memory: 1Gi
                probes:
                  liveness:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket:
                        port: 8000
                      initialDelaySeconds: 30
                      periodSeconds: 30
                  readiness:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket:
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  startup:
                    enabled: true
                    custom: true
                    spec:
                      tcpSocket:
                        port: 8000
                      periodSeconds: 10
                      failureThreshold: 30

        service:
          basic-memory:
            controller: basic-memory
            ports:
              http:
                port: 8000

        ingress:
          basic-memory:
            className: nginx
            annotations:
              nginx.ingress.kubernetes.io/auth-type: basic
              nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
              nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
              # Route through litellm's MCP gateway (via oathkeeper, which injects the
              # litellm key) instead of straight to the pod -- so tool calls land in
              # litellm's per-tool usage stats. Hyphen->underscore: the litellm alias
              # is `basic_memory`. See platform/oathkeeper.
              nginx.ingress.kubernetes.io/use-regex: "true"
              nginx.ingress.kubernetes.io/rewrite-target: /mcp/basic_memory$2
              # MCP streamable-http: don't buffer/cut long-lived responses.
              nginx.ingress.kubernetes.io/proxy-buffering: "off"
              nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
              nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
              nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
            hosts:
              - host: dev.whitediver.keenetic.link
                paths:
                  - path: /mcp/basic-memory(/|$)(.*)
                    pathType: ImplementationSpecific
                    service:
                      name: oathkeeper-proxy
                      port: 4455

        persistence:
          data:
            enabled: true
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 5Gi
            storageClass: basic-memory-smb
            nameOverride: data-smb
            retain: true
            advancedMounts:
              basic-memory:
                app:
                  - path: /app/data

        rawResources:
          smb:
            apiVersion: storage.k8s.io/v1
            kind: StorageClass
            spec:
              provisioner: smb.csi.k8s.io
              reclaimPolicy: Retain
              volumeBindingMode: Immediate
              allowVolumeExpansion: true
              parameters:
                source: "//192.168.99.44/smb-csi"
                subDir: "pvc-${pvc.metadata.namespace}-${pvc.metadata.name}"
                csi.storage.k8s.io/provisioner-secret-name: smbcreds
                csi.storage.k8s.io/provisioner-secret-namespace: smb
                csi.storage.k8s.io/node-stage-secret-name: smbcreds
                csi.storage.k8s.io/node-stage-secret-namespace: smb
              mountOptions:
                - vers=3.1.1
                - serverino
                - actimeo=1
                - cache=none
                - nobrl
                - uid=1000
                - gid=1000
                - dir_mode=0700
                - file_mode=0600

  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
