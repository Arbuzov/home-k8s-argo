apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-atlassian-confluence
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mcp
  source:
    repoURL: https://arbuzov.github.io/mcp-helm/
    targetRevision: 0.2.28
    chart: mcp-atlassian
    helm:
      values: |
        extraArgs:
          - --transport
          - streamable-http
          - --stateless
        image:
          repository: ghcr.io/arbuzov/mcp-atlassian
          tag: 0.21.1-fork.1
        env:
          CONFLUENCE_URL: https://confluence.corp.example
          CONFLUENCE_SSL_VERIFY: 'false'
          MCP_VERY_VERBOSE: true
          MCP_LOGGING_STDOUT: true
          TRANSPORT: streamable-http
        envSecrets:
          CONFLUENCE_USERNAME:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_USERNAME
          CONFLUENCE_API_TOKEN:
            name: mcp-atlassian-confluence-credentials
            key: CONFLUENCE_API_TOKEN
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/auth-type: basic
            nginx.ingress.kubernetes.io/auth-secret: mcp-basic-auth
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
            nginx.ingress.kubernetes.io/rewrite-target: /mcp/confluence$2
          path: /mcp/confluence
          hosts:
            - dev.whitediver.keenetic.link
            - "*"
        sidecars:
          - name: vpn-sidecar
            image: docker.io/aw1cks/openconnect
            env:
              - name: URL
                value: "https://vpn.corp.example"
              - name: AUTH_GROUP
                value: VPN_GROUP_A
              - name: EXTRA_ARGS
                value: '--servercert pin-sha256:REDACTED'
              - name: USER
                valueFrom:
                  secretKeyRef:
                    name: mcp-atlassian-vpn-credentials
                    key: USERNAME
              - name: PASS
                valueFrom:
                  secretKeyRef:
                    name: mcp-atlassian-vpn-credentials
                    key: PASSWORD
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
            # OpenConnect runs with --background, so when the corp concentrator
            # drops the tunnel (e.g. idle timeout) the process exits but the
            # container's PID 1 (dnsmasq) keeps running — the pod stays Running
            # with a dead tunnel and every Confluence call times out. This
            # liveness probe fails once tun127 loses its address, so Kubernetes
            # restarts the sidecar, which re-establishes the tunnel and routes
            # in the shared netns. self-heals the drop (same as mcp/gitlab).
            livenessProbe:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - ip addr show tun127 | grep -q "inet "
              initialDelaySeconds: 60
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
