apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openconnect-gateway
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/Arbuzov/home-cluster-helm.git
    targetRevision: HEAD
    path: arbuzov/networking/openconnect-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
