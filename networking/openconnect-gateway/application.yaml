apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openconnect-gateway
  namespace: argo-cd
spec:
  project: networking
  source:
    repoURL: git@github.com:Arbuzov/home-k8s-helm.git
    targetRevision: HEAD
    path: arbuzov/networking/openconnect-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
