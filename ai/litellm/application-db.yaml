apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm-db
  namespace: argo-cd
spec:
  project: ai
  source:
    repoURL: https://github.com/Arbuzov/home-k8s-argo.git
    targetRevision: main
    path: ai/litellm/db-cnpg
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - ServerSideDiff=true
