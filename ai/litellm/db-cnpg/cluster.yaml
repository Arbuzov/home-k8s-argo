apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: litellm-pg
  namespace: litellm
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:15.18
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  storage:
    size: 5Gi
    storageClass: litellm-pg-local
  bootstrap:
    initdb:
      database: litellm
      owner: litellm
  affinity:
    nodeSelector:
      kubernetes.io/hostname: kube-worker-3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
