apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: ghcr.io/berriai
    targetRevision: 1.90.0
    chart: litellm-helm
    helm:
      values: |
        image:
          repository: ghcr.io/berriai/litellm
          pullPolicy: IfNotPresent
        masterkeySecretName: litellm-masterkey
        masterkeySecretKey: masterkey
        db:
          deployStandalone: true
          useExisting: false
        postgresql:
          auth:
            username: litellm
            database: litellm
          primary:
            persistence:
              enabled: true
              storageClass: local-path
              size: 8Gi
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/hostname
                          operator: In
                          values:
                            - kube-master # TEMP: kube-worker-3 dropped, its container runtime is wedged (new pods stuck ContainerCreating)
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
            tag: "16"
        migrationJob:
          enabled: false # TEMP: re-enable once litellm-postgresql exists (PreSync hook deadlocks against a DB that isn't created yet)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          hooks:
            argocd:
              enabled: true
            helm:
              enabled: false
        environmentSecrets:
          - litellm-env-secret
        proxy_config:
          model_list:
            - model_name: "nvidia_nim/*"
              litellm_params:
                model: "nvidia_nim/*"
                api_key: os.environ/NVIDIA_NIM_API_KEY
          general_settings:
            master_key: os.environ/PROXY_MASTER_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "500m"
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values:
                        - kube-master # TEMP: kube-worker-3 dropped, its container runtime is wedged (new pods stuck ContainerCreating)
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: litellm.whitediver.keenetic.link
              paths:
                - path: /
                  pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm