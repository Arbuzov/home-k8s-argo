apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: ghcr.io/berriai
      targetRevision: 1.90.0
      chart: litellm-helm
      helm:
        values: |
          image:
            # ROLLED BACK 2026-07-05: -database variant's fresh-container
            # startup (Prisma query-engine staging) got stuck in D-state
            # (disk sleep) for 15+ min on kube-worker-3, which was also
            # showing ephemeral-storage eviction warnings and a kubelet
            # blip around the same time -- real node I/O contention, not a
            # CPU problem. Reverting to plain image + migrationJob:false
            # until the node settles; retry later, possibly on a less
            # concentrated node.
            repository: ghcr.io/berriai/litellm
            pullPolicy: IfNotPresent
          masterkeySecretName: litellm-masterkey
          masterkeySecretKey: masterkey
          db:
            deployStandalone: false
            useExisting: true
            endpoint: litellm-postgres
            database: litellm
            secret:
              name: litellm-db
              usernameKey: username
              passwordKey: password
          migrationJob:
            # Disabled again 2026-07-05 -- see image comment above, same
            # rollback (node I/O contention on kube-worker-3, not CPU).
            enabled: false
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "1536Mi"
                cpu: "1000m"
            hooks:
              argocd:
                enabled: false # no bundled postgres to wait on anymore; don't gate sync on a hook
              helm:
                enabled: false
          envVars:
            CHECKPOINT_DISABLE: "1" # prisma CLI's telemetry/update-check hangs ~60s with no reachable checkpoint.prisma.io, eating the whole hardcoded migration timeout
            PRISMA_HIDE_UPDATE_MESSAGE: "true"
          environmentSecrets:
            - litellm-env-secret
          proxy_config:
            model_list:
              - model_name: "nvidia_nim/*"
                litellm_params:
                  model: "nvidia_nim/*"
                  api_key: os.environ/NVIDIA_NIM_API_KEY
            general_settings:
              master_key: os.environ/PROXY_MASTER_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          affinity:
            nodeAffinity:
              # Soft, not hard: a previous hard pin to a single node (kube-master,
              # after kube-worker-3's runtime was briefly wedged) left litellm
              # stuck Pending when that node had no room. worker-3 is healthy
              # again (running pigallery2/n8n/etc. fine) and has the most spare
              # CPU/RAM in the cluster -- prefer it, but don't hard-require it.
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - kube-worker-3
          ingress:
            enabled: true
            className: nginx
            hosts:
              - host: litellm.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
    - repoURL: https://github.com/Arbuzov/home-k8s-argo.git
      targetRevision: main
      path: ai/litellm/db
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
