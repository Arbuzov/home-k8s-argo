apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: ghcr.io/berriai
      targetRevision: 1.90.0
      chart: litellm-helm
      helm:
        values: |
          image:
            repository: ghcr.io/berriai/litellm-database
            pullPolicy: IfNotPresent
          masterkeySecretName: litellm-masterkey
          masterkeySecretKey: masterkey
          db:
            deployStandalone: false
            useExisting: true
            endpoint: litellm-postgres
            database: litellm
            secret:
              name: litellm-db
              usernameKey: username
              passwordKey: password
          migrationJob:
            enabled: true
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "1536Mi"
                cpu: "1000m"
            hooks:
              argocd:
                enabled: false
              helm:
                enabled: false
          envVars:
            CHECKPOINT_DISABLE: "1"
            PRISMA_HIDE_UPDATE_MESSAGE: "true"
            PROXY_BASE_URL: "https://litellm.whitediver.keenetic.link"
            ALLOWED_EMAIL_DOMAINS: "whitediver.com"
            PROXY_ADMIN_ID: "113025592623482135602"
          environmentSecrets:
            - litellm-env-secret
          proxy_config:
            model_list:
              - model_name: "nvidia_nim/*"
                litellm_params:
                  model: "nvidia_nim/*"
                  api_key: os.environ/NVIDIA_NIM_API_KEY
                  api_base: os.environ/NVIDIA_NIM_API_BASE
            general_settings:
              master_key: os.environ/PROXY_MASTER_KEY
              store_model_in_db: true
            litellm_settings:
              turn_off_message_logging: true
            mcp_servers:
              jira:
                url: "http://mcp-atlassian-jira.mcp.svc.cluster.local:8000/mcp/jira"
                transport: "http"
                description: "Atlassian Jira"
                allow_all_keys: true
              confluence:
                url: "http://mcp-atlassian-confluence.mcp.svc.cluster.local:8000/mcp/confluence"
                transport: "http"
                description: "Atlassian Confluence"
                allow_all_keys: true
              gitlab:
                url: "http://mcp-gitlab.mcp.svc.cluster.local:3002/mcp"
                transport: "http"
                description: "GitLab (self-hosted, corp VPN)"
                allow_all_keys: true
              basic_memory:
                url: "http://basic-memory.mcp.svc.cluster.local:8000/mcp/basic-memory"
                transport: "http"
                description: "Basic Memory knowledge base"
                allow_all_keys: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - kube-worker-3
          ingress:
            enabled: true
            className: nginx
            hosts:
              - host: litellm.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
    - repoURL: https://github.com/Arbuzov/home-k8s-argo.git
      targetRevision: main
      path: ai/litellm/db
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
