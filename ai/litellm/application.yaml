apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - repoURL: ghcr.io/berriai
      targetRevision: 1.90.0
      chart: litellm-helm
      helm:
        values: |
          image:
            # Retry 2026-07-05: previous attempt hit kube-worker-3 disk
            # contention (~500MB margin above the eviction threshold).
            # Freed real headroom by disabling opds-shelf's calibre (1.3GB
            # image) -- margin now ~5.2GB. -database variant activates the
            # DB-backed code paths (admin UI, virtual keys, budgets, request
            # logging) that db.useExisting wires up.
            repository: ghcr.io/berriai/litellm-database
            pullPolicy: IfNotPresent
          masterkeySecretName: litellm-masterkey
          masterkeySecretKey: masterkey
          db:
            deployStandalone: false
            useExisting: true
            endpoint: litellm-postgres
            database: litellm
            secret:
              name: litellm-db
              usernameKey: username
              passwordKey: password
          migrationJob:
            # Re-enabled 2026-07-05 (retry) -- see image comment above.
            enabled: true
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "1536Mi"
                cpu: "1000m"
            hooks:
              argocd:
                enabled: false # no bundled postgres to wait on anymore; don't gate sync on a hook
              helm:
                enabled: false
          envVars:
            CHECKPOINT_DISABLE: "1" # prisma CLI's telemetry/update-check hangs ~60s with no reachable checkpoint.prisma.io, eating the whole hardcoded migration timeout
            PRISMA_HIDE_UPDATE_MESSAGE: "true"
            # Admin UI Google SSO (GOOGLE_CLIENT_ID/SECRET live in litellm-env-secret,
            # same shared Google OAuth client as argo-cd/grafana/vikunja/photoprism).
            # UI_USERNAME/UI_PASSWORD still work as a fallback at /fallback/login.
            PROXY_BASE_URL: "https://litellm.whitediver.keenetic.link"
            ALLOWED_EMAIL_DOMAINS: "whitediver.com"
            PROXY_ADMIN_ID: "113025592623482135602" # owner's Google SSO user id -- grants proxy_admin
          environmentSecrets:
            - litellm-env-secret
          proxy_config:
            model_list:
              - model_name: "nvidia_nim/*"
                litellm_params:
                  model: "nvidia_nim/*"
                  api_key: os.environ/NVIDIA_NIM_API_KEY
                  api_base: os.environ/NVIDIA_NIM_API_BASE
            general_settings:
              master_key: os.environ/PROXY_MASTER_KEY
              # Required for the litellm-nim-sync CronJob's POST /model/new
              # (db/nim-sync-cronjob.yaml) -- without this it 500s with
              # "Set 'STORE_MODEL_IN_DB=True'".
              store_model_in_db: true
            # MCP servers already running in the `mcp` namespace, reached over
            # in-cluster DNS (<svc>.mcp.svc.cluster.local -- cross-namespace, so
            # the FQDN is required). Hitting the ClusterIP directly bypasses the
            # ingress basic-auth, same as mcpo does. LiteLLM re-exposes their
            # tools through its MCP gateway at /mcp. transport: http == the
            # streamable-http the servers are started with.
            mcp_servers:
              jira:
                url: "http://mcp-atlassian-jira.mcp.svc.cluster.local:8000/mcp/jira"
                transport: "http"
                description: "Atlassian Jira"
              confluence:
                url: "http://mcp-atlassian-confluence.mcp.svc.cluster.local:8000/mcp/confluence"
                transport: "http"
                description: "Atlassian Confluence"
              # gitlab differs from the atlassian pair: port 3002 (the
              # token-injector sidecar, which adds the Private-Token) and the
              # app serves at /mcp, not /mcp/gitlab (its ingress rewrites to
              # /mcp). Don't "normalise" this to match the others -- it 404s.
              gitlab:
                url: "http://mcp-gitlab.mcp.svc.cluster.local:3002/mcp"
                transport: "http"
                description: "GitLab (self-hosted, corp VPN)"
              # underscore, not hyphen: litellm's validate_mcp_server_name
              # rejects '-' in the server name (the URL keeps the real svc name).
              basic_memory:
                url: "http://basic-memory.mcp.svc.cluster.local:8000/mcp/basic-memory"
                transport: "http"
                description: "Basic Memory knowledge base"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          affinity:
            nodeAffinity:
              # Soft, not hard: a previous hard pin to a single node (kube-master,
              # after kube-worker-3's runtime was briefly wedged) left litellm
              # stuck Pending when that node had no room. worker-3 is healthy
              # again (running pigallery2/n8n/etc. fine) and has the most spare
              # CPU/RAM in the cluster -- prefer it, but don't hard-require it.
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - kube-worker-3
          ingress:
            enabled: true
            className: nginx
            hosts:
              - host: litellm.whitediver.keenetic.link
                paths:
                  - path: /
                    pathType: Prefix
    - repoURL: https://github.com/Arbuzov/home-k8s-argo.git
      targetRevision: main
      path: ai/litellm/db
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
