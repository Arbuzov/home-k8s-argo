apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-nim-sync
  namespace: litellm
spec:
  schedule: "0 */3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: LITELLM_MASTER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-masterkey
                      key: masterkey
                - name: NVIDIA_NIM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-env-secret
                      key: NVIDIA_NIM_API_KEY
                - name: NVIDIA_NIM_API_BASE
                  valueFrom:
                    secretKeyRef:
                      name: litellm-env-secret
                      key: NVIDIA_NIM_API_BASE
              command: ["python3", "-c"]
              args:
                - |
                  import json, os, urllib.request as u

                  LL = "http://litellm:4000"
                  KEY = os.environ["LITELLM_MASTER_KEY"]
                  NIM_KEY = os.environ["NVIDIA_NIM_API_KEY"]
                  NIM_BASE = os.environ["NVIDIA_NIM_API_BASE"].rstrip("/")

                  # GitHub Copilot: explicit models registered by name (no wildcard). Auth is via
                  # the access-token mounted into the litellm pod, so no credentials are needed here.
                  # Curated to ids that actually return content on the current subscription — the full
                  # Copilot catalog also exposes gated (opus, gpt-5.5) and empty-response (gemini, kimi) ids.
                  COPILOT = [
                      "claude-sonnet-5",
                      "claude-sonnet-4.6",
                      "claude-haiku-4.5",
                      "gpt-5.4",
                  ]

                  def get(url, tok):
                      req = u.Request(url, headers={"Authorization": "Bearer " + tok})
                      return json.load(u.urlopen(req, timeout=30))

                  def add(model_name, params):
                      body = json.dumps({"model_name": model_name, "litellm_params": params}).encode()
                      req = u.Request(LL + "/model/new", data=body, method="POST",
                                      headers={"Authorization": "Bearer " + KEY,
                                               "Content-Type": "application/json"})
                      u.urlopen(req, timeout=30)

                  existing = {m["model_name"] for m in get(LL + "/model/info", KEY)["data"]}
                  added = 0

                  # NVIDIA NIM: whole catalog, dynamically
                  catalog = [m["id"] for m in get(NIM_BASE + "/models", NIM_KEY)["data"]]
                  for mid in catalog:
                      if mid in existing:
                          continue
                      try:
                          add(mid, {"model": "nvidia_nim/" + mid, "api_key": NIM_KEY, "api_base": NIM_BASE})
                          added += 1
                          print("added nim", mid)
                      except Exception as e:
                          print("FAIL nim", mid, e)

                  # GitHub Copilot: explicit list, model_name prefixed for provenance
                  for mid in COPILOT:
                      name = "github_copilot/" + mid
                      if name in existing:
                          continue
                      try:
                          add(name, {"model": "github_copilot/" + mid})
                          added += 1
                          print("added copilot", mid)
                      except Exception as e:
                          print("FAIL copilot", mid, e)

                  print("done: %d added, %d existing, %d nim catalog, %d copilot"
                        % (added, len(existing), len(catalog), len(COPILOT)))
