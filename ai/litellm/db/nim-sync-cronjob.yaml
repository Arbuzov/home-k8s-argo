apiVersion: batch/v1
kind: CronJob
metadata:
  name: litellm-nim-sync
  namespace: litellm
spec:
  schedule: "0 */3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.12-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: LITELLM_MASTER_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-masterkey
                      key: masterkey
                - name: NVIDIA_NIM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: litellm-env-secret
                      key: NVIDIA_NIM_API_KEY
                - name: NVIDIA_NIM_API_BASE
                  valueFrom:
                    secretKeyRef:
                      name: litellm-env-secret
                      key: NVIDIA_NIM_API_BASE
              command: ["python3", "-c"]
              args:
                - |
                  import json, os, urllib.request as u

                  LL = "http://litellm:4000"
                  KEY = os.environ["LITELLM_MASTER_KEY"]
                  NIM_KEY = os.environ["NVIDIA_NIM_API_KEY"]
                  NIM_BASE = os.environ["NVIDIA_NIM_API_BASE"].rstrip("/")

                  # GitHub Copilot: explicit models registered by name (no wildcard). Auth is via
                  # the access-token mounted into the litellm pod, so no credentials are needed here.
                  # Curated to ids that actually return content on the current subscription — the full
                  # Copilot catalog also exposes gated (opus, gpt-5.5) and empty-response (gemini, kimi) ids.
                  COPILOT = [
                      "claude-sonnet-5",
                      "claude-sonnet-4.6",
                      "claude-haiku-4.5",
                      "gpt-5.4",
                  ]

                  def get(url, tok):
                      req = u.Request(url, headers={"Authorization": "Bearer " + tok})
                      return json.load(u.urlopen(req, timeout=30))

                  def add(model_name, params):
                      body = json.dumps({"model_name": model_name, "litellm_params": params}).encode()
                      req = u.Request(LL + "/model/new", data=body, method="POST",
                                      headers={"Authorization": "Bearer " + KEY,
                                               "Content-Type": "application/json"})
                      u.urlopen(req, timeout=30)

                  def delete(model_id):
                      body = json.dumps({"id": model_id}).encode()
                      req = u.Request(LL + "/model/delete", data=body, method="POST",
                                      headers={"Authorization": "Bearer " + KEY,
                                               "Content-Type": "application/json"})
                      u.urlopen(req, timeout=30)

                  info = get(LL + "/model/info", KEY)["data"]
                  existing = {m["model_name"] for m in info}
                  added = 0

                  # NVIDIA NIM: whole catalog, dynamically
                  catalog = [m["id"] for m in get(NIM_BASE + "/models", NIM_KEY)["data"]]
                  for mid in catalog:
                      if mid in existing:
                          continue
                      try:
                          add(mid, {"model": "nvidia_nim/" + mid, "api_key": NIM_KEY, "api_base": NIM_BASE})
                          added += 1
                          print("added nim", mid)
                      except Exception as e:
                          print("FAIL nim", mid, e)

                  # GitHub Copilot: explicit list, model_name prefixed for provenance
                  for mid in COPILOT:
                      name = "github_copilot/" + mid
                      if name in existing:
                          continue
                      try:
                          add(name, {"model": "github_copilot/" + mid})
                          added += 1
                          print("added copilot", mid)
                      except Exception as e:
                          print("FAIL copilot", mid, e)

                  # Prune: delete NIM models the catalog no longer lists (end-of-life / pulled).
                  # NVIDIA drops an EOL model from /models but litellm keeps the DB registration, so
                  # the council keeps calling a dead id that 410s ("times out / glitches"). Scope: only
                  # models we manage (litellm_params.model == "nvidia_nim/<id>") - never the wildcard
                  # or github_copilot/*. Safety cap: if more than PRUNE_CAP look stale the catalog
                  # probably came back short, so skip rather than mass-delete good models. The catalog
                  # fetch above raises on failure, so we never prune against an empty/failed catalog.
                  PRUNE_CAP = 15
                  catalog_set = set(catalog)
                  stale = []
                  for m in info:
                      pm = (m.get("litellm_params") or {}).get("model") or ""
                      if not pm.startswith("nvidia_nim/") or pm == "nvidia_nim/*":
                          continue
                      if pm[len("nvidia_nim/"):] not in catalog_set:
                          stale.append(m)
                  removed = 0
                  if len(stale) > PRUNE_CAP:
                      print("SKIP prune: %d models look stale (> cap %d) - catalog likely short this run"
                            % (len(stale), PRUNE_CAP))
                  else:
                      for m in stale:
                          mid = (m.get("model_info") or {}).get("id")
                          if not mid:
                              print("SKIP prune (no id)", m["model_name"]); continue
                          try:
                              delete(mid)
                              removed += 1
                              print("pruned", m["model_name"])
                          except Exception as e:
                              print("FAIL prune", m["model_name"], e)

                  print("done: %d added, %d pruned, %d existing, %d nim catalog, %d copilot"
                        % (added, removed, len(existing), len(catalog), len(COPILOT)))
