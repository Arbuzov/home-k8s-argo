apiVersion: v1
kind: Secret
metadata:
  name: litellm-db
  namespace: litellm
type: Opaque
stringData:
  username: litellm
  password: "LtLm-pg-h7k2Qs9vDx4Rw"
  database: litellm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: litellm
  labels:
    app: litellm-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litellm-postgres
  template:
    metadata:
      labels:
        app: litellm-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: kube-master
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-pgdata
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /var/lib/postgresql/data/pgdata && chown -R 999:999 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:15
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - synchronous_commit=off
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-db
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          ports:
            - containerPort: 5432
              name: tcp
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm", "-d", "litellm"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["pg_ctl", "-D", "/var/lib/postgresql/data/pgdata", "-m", "fast", "-w", "stop"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
      volumes:
        - name: data
          hostPath:
            path: /var/lib/litellm-postgres-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: litellm
spec:
  selector:
    app: litellm-postgres
  ports:
    - name: tcp
      port: 5432
      targetPort: 5432
