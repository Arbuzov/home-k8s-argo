apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argo-cd
spec:
  project: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  source:
    repoURL: 8gears.container-registry.com/library
    targetRevision: 2.0.1
    helm:
      values: |
        image:
          repository: n8nio/n8n
          tag: 2.18.4
        db:
          type: postgresdb
          logging:
            enabled: true
            options: error
            maxQueryExecutionTime: 1000
        worker:
          enabled: true
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "800m"
          extraEnv: &extraEnv
            N8N_RUNNERS_ENABLED:
              value: "true"
            N8N_USER_FOLDER:
              value: /home/node
            N8N_PORT:
              value: '5678'
            N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
              value: "true"
            N8N_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            DB_POSTGRESDB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-n8n
                  key: POSTGRES_PASSWORD
            WEBHOOK_URL:
              value: https://n8n.whitediver.keenetic.link/
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
        webhook:
          config:
            executions_mode: queue
            queue:
              health:
                check:
                  active: true
              bull:
                redis:
                  host: n8n-redis
                  port: 6379
          enabled: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          extraEnv: *extraEnv
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
        main:
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"   # was 700m; actual idle ~43m, burst still allowed via 1500m limit
            limits:
              memory: "1536Mi"
              cpu: "1500m"
          config:
            db:
              type: postgresdb
              postgresdb:
                host: n8n-pg-rw
                port: 5432
                database: n8n
                user: n8n
            queue:
              health:
                check:
                  active: true
              bull:
                redis:
                  host: n8n-redis
                  port: 6379
          extraEnv:
            N8N_USER_FOLDER:
              value: /home/node
            N8N_EDITOR_BASE_URL:
              value: https://n8n.whitediver.keenetic.link/
            VUE_APP_URL_BASE_API:
              value: https://n8n.whitediver.keenetic.link/
            WEBHOOK_URL:
              value: https://n8n.whitediver.keenetic.link/
            N8N_HOST:
              value: n8n.whitediver.keenetic.link
            N8N_ENCRYPTION_KEY:
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: N8N_ENCRYPTION_KEY
            DB_POSTGRESDB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: postgres-n8n
                  key: POSTGRES_PASSWORD
            N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:
              value: "true"
            N8N_PORT:
              value: '5678'
            N8N_PROXY_HOPS:
              value: '3'
            N8N_RUNNERS_ENABLED:
              value: "true"
            N8N_PROTOCOL:
              value: https
            N8N_SKIP_WEBHOOK_ORIGIN_CHECK:
              value: "true"
            N8N_DISABLE_PRODUCTION_MAIN_PROCESS:
              value: "true"
            NODE_ENV:
              value: development
          persistence:
            enabled: false
            storageClass: "smb"
            type: dynamic
          livenessProbe: null
          readinessProbe: null
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
          podSecurityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
          extraVolumeMounts:
                - mountPath: /home/node/.cache
                  name: n8n-cache
          extraVolumes:
            - name: n8n-cache
              emptyDir: {}
        extraManifests:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: redis-n8n
              namespace: n8n
              labels:
                app: redis-n8n
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: redis-n8n
              template:
                metadata:
                  labels:
                    app: redis-n8n
                spec:
                  containers:
                    - name: redis
                      image: redis:7
                      imagePullPolicy: IfNotPresent
                      ports:
                        - containerPort: 6379
                          name: redis
                      resources:
                        requests:
                          memory: "64Mi"
                          cpu: "50m"
                        limits:
                          memory: "128Mi"
                          cpu: "200m"
          - apiVersion: v1
            kind: Service
            metadata:
              name: n8n-redis
              namespace: n8n
            spec:
              selector:
                app: redis-n8n
              ports:
                - name: redis
                  port: 6379
                  targetPort: 6379
          - apiVersion: storage.k8s.io/v1
            kind: StorageClass
            metadata:
              name: smb-pg
            provisioner: smb.csi.k8s.io
            parameters:
              csi.storage.k8s.io/node-stage-secret-name: smbcreds
              csi.storage.k8s.io/node-stage-secret-namespace: smb
              csi.storage.k8s.io/provisioner-secret-name: smbcreds
              csi.storage.k8s.io/provisioner-secret-namespace: smb
              source: //192.168.99.44/smb-csi
              subDir: "pvc-${pvc.metadata.namespace}-${pvc.metadata.name}"
            mountOptions:
              - vers=3.1.1
              - serverino
              - cache=loose
              - actimeo=60
              - uid=999
              - gid=999
              - dir_mode=0700
              - file_mode=0600
            allowVolumeExpansion: true
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
          - apiVersion: storage.k8s.io/v1
            kind: StorageClass
            metadata:
              name: smb-pgbackup
            provisioner: smb.csi.k8s.io
            parameters:
              csi.storage.k8s.io/node-stage-secret-name: smbcreds
              csi.storage.k8s.io/node-stage-secret-namespace: smb
              csi.storage.k8s.io/provisioner-secret-name: smbcreds
              csi.storage.k8s.io/provisioner-secret-namespace: smb
              source: //192.168.99.44/smb-csi
              subDir: "postgres-backups/${pvc.metadata.namespace}"
            mountOptions:
              - vers=3.1.1
              - serverino
              - cache=none
              - actimeo=1
              - nobrl
              - uid=999
              - gid=999
              - dir_mode=0700
              - file_mode=0600
            allowVolumeExpansion: true
            reclaimPolicy: Retain
            volumeBindingMode: Immediate
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: n8n-backup
              namespace: n8n
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
              storageClassName: smb
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: n8n-pg-backup
              namespace: n8n
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 1Gi
              storageClassName: smb-pgbackup
          - apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: n8n-backup
              namespace: n8n
            spec:
              schedule: "0 3 * * *"
              concurrencyPolicy: Forbid
              successfulJobsHistoryLimit: 3
              failedJobsHistoryLimit: 3
              jobTemplate:
                spec:
                  backoffLimit: 1
                  template:
                    spec:
                      restartPolicy: Never
                      enableServiceLinks: false
                      securityContext:
                        runAsUser: 999
                        runAsGroup: 999
                        fsGroup: 999
                      containers:
                        - name: export
                          image: n8nio/n8n:2.18.4
                          imagePullPolicy: IfNotPresent
                          env:
                            - name: N8N_USER_FOLDER
                              value: /tmp
                            - name: DB_TYPE
                              value: postgresdb
                            - name: DB_POSTGRESDB_HOST
                              value: n8n-pg-rw
                            - name: DB_POSTGRESDB_PORT
                              value: "5432"
                            - name: DB_POSTGRESDB_DATABASE
                              value: n8n
                            - name: DB_POSTGRESDB_USER
                              value: n8n
                            - name: DB_POSTGRESDB_PASSWORD
                              valueFrom:
                                secretKeyRef:
                                  name: postgres-n8n
                                  key: POSTGRES_PASSWORD
                            - name: N8N_ENCRYPTION_KEY
                              valueFrom:
                                secretKeyRef:
                                  name: n8n-secrets
                                  key: N8N_ENCRYPTION_KEY
                          command:
                            - sh
                            - -c
                            - |
                              ts=$(date +%F)
                              # Postgres can be mid-restart (CIFS) — retry ~10 min.
                              i=0
                              while true; do
                                if n8n export:workflow --all --output=/backup/workflows-$ts.json && n8n export:credentials --all --output=/backup/credentials-$ts.json; then break; fi
                                i=$((i+1)); [ $i -ge 30 ] && { echo "export failed after retries"; exit 1; }
                                echo "db not ready, retry $i in 20s"; sleep 20
                              done
                              find /backup -name 'workflows-*.json' -mtime +14 -delete
                              find /backup -name 'credentials-*.json' -mtime +14 -delete
                              ls -la /backup
                          volumeMounts:
                            - name: backup
                              mountPath: /backup
                      volumes:
                        - name: backup
                          persistentVolumeClaim:
                            claimName: n8n-pg-backup
          - apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: n8n-db-backup
              namespace: n8n
            spec:
              schedule: "30 3 * * *"
              concurrencyPolicy: Forbid
              successfulJobsHistoryLimit: 3
              failedJobsHistoryLimit: 3
              jobTemplate:
                spec:
                  backoffLimit: 2
                  template:
                    spec:
                      restartPolicy: Never
                      nodeSelector:
                        kubernetes.io/hostname: kube-master
                      securityContext:
                        runAsUser: 999
                        runAsGroup: 999
                        fsGroup: 999
                      containers:
                        - name: pgdump
                          image: postgres:15
                          imagePullPolicy: IfNotPresent
                          env:
                            - name: PGPASSWORD
                              valueFrom:
                                secretKeyRef:
                                  name: postgres-n8n
                                  key: POSTGRES_PASSWORD
                          command:
                            - sh
                            - -c
                            - |
                              set -e
                              ts=$(date +%F)
                              i=0
                              until pg_isready -h n8n-pg-rw -U n8n -d n8n; do
                                i=$((i+1)); [ $i -ge 60 ] && { echo "db never ready"; exit 1; }
                                echo "waiting for db ($i)"; sleep 5
                              done
                              pg_dump -h n8n-pg-rw -U n8n -d n8n | gzip -c > /backup/db-$ts.sql.gz
                              find /backup -name 'db-*.sql.gz' -mtime +14 -delete
                              ls -la /backup
                          volumeMounts:
                            - name: backup
                              mountPath: /backup
                      volumes:
                        - name: backup
                          persistentVolumeClaim:
                            claimName: n8n-pg-backup
        ingress:
          enabled: true
          className: "nginx"
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "100m"
            nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
            nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "600"
          hosts:
            - host: n8n.whitediver.keenetic.link
              paths:
                - path: /
                  pathType: Prefix
    chart: n8n
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
